name: "React Native Android Build & Publish"
description: "Builds a React Native Android app and publishes it to the Google Play Store."
author: "George Chitechi"

inputs:
  working-directory:
    description: "The directory where the React Native app is located"
    required: false
    default: "."
  node-version:
    description: "Node.js version to use"
    required: false
    default: "24"
  java-version:
    description: "Java version to use (e.g. 21)"
    required: false
    default: "21"
  keystore-base64:
    description: "Base64 encoded Android keystore"
    required: true
  keystore-password:
    description: "Password for the keystore"
    required: true
  key-alias:
    description: "Alias for the key"
    required: true
  key-password:
    description: "Password for the key"
    required: true
  service-account-json:
    description: "Google Play Console service account JSON (plain text)"
    required: false
  package-name:
    description: "The Android application package name (e.g. com.example.app)"
    required: false
  track:
    description: "The Google Play track (internal, alpha, beta, production)"
    required: false
    default: "internal"
  build-type:
    description: "Build type: aab or apk"
    required: false
    default: "aab"
  publish-to-play-store:
    description: "Whether to publish the app to Google Play Store"
    required: false
    default: "false"
  save-to-releases:
    description: "Whether to upload the build to GitHub Releases (only runs on tag pushes)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: "temurin"
        java-version: ${{ inputs.java-version }}
        cache: "gradle"

    - name: Install npm dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm install

    - name: Decode Keystore
      shell: bash
      working-directory: ${{ inputs.working-directory }}/android/app
      run: |
        echo "${{ inputs.keystore-base64 }}" | base64 --decode > release.keystore

    - name: Build Android App
      shell: bash
      working-directory: ${{ inputs.working-directory }}/android
      run: |
        if [ "${{ inputs.build-type }}" == "aab" ]; then
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=${{ inputs.keystore-password }} \
            -Pandroid.injected.signing.key.alias=${{ inputs.key-alias }} \
            -Pandroid.injected.signing.key.password=${{ inputs.key-password }}
        else
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=${{ inputs.keystore-password }} \
            -Pandroid.injected.signing.key.alias=${{ inputs.key-alias }} \
            -Pandroid.injected.signing.key.password=${{ inputs.key-password }}
        fi

    - name: Identify Output File
      shell: bash
      id: output-file
      run: |
        if [ "${{ inputs.build-type }}" == "aab" ]; then
          FILE_PATH="${{ inputs.working-directory }}/android/app/build/outputs/bundle/release/app-release.aab"
        else
          FILE_PATH="${{ inputs.working-directory }}/android/app/build/outputs/apk/release/app-release.apk"
        fi
        echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT

    - name: Upload to Google Play
      if: ${{ inputs.publish-to-play-store == 'true' }}
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ inputs.service-account-json }}
        packageName: ${{ inputs.package-name }}
        releaseFiles: ${{ steps.output-file.outputs.file_path }}
        track: ${{ inputs.track }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: app-release-${{ inputs.build-type }}
        path: ${{ steps.output-file.outputs.file_path }}
        retention-days: 14

    - name: Upload to GitHub Releases
      if: ${{ inputs.save-to-releases == 'true' && github.ref_type == 'tag' }}
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ steps.output-file.outputs.file_path }}
